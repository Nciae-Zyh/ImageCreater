name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac-x64
            build_command: pnpm build:mac:x64
            artifact_name: release-mac-x64
          - os: macos-latest
            platform: mac-arm64
            build_command: pnpm build:mac:arm64
            artifact_name: release-mac-arm64
          - os: ubuntu-latest
            platform: linux
            build_command: pnpm build:linux
            artifact_name: release-linux
          - os: windows-latest
            platform: win
            build_command: pnpm build:win
            artifact_name: release-windows

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron
        if: ${{ !startsWith(matrix.platform, 'mac-') }}
        run: pnpm build

      - name: Build package
        run: ${{ matrix.build_command }}

      - name: Upload artifacts (macOS)
        if: ${{ startsWith(matrix.platform, 'mac-') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.yaml

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.yml
            dist/*.yaml

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.yaml

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ## õĖŗĶĮĮĶ»┤µśÄ

          - macOS Apple Silicon’╝łM1/M2/M3/M4’╝ē’╝ÜõĖŗĶĮĮµ¢ćõ╗ČÕÉŹÕīģÕÉ½ `mac-arm64` ńÜä `.dmg`
          - macOS Intel’╝ÜõĖŗĶĮĮµ¢ćõ╗ČÕÉŹÕīģÕÉ½ `mac-x64` ńÜä `.dmg`
          - Windows 64 õĮŹ’╝ÜõĖŗĶĮĮ `.exe`
          - Linux 64 õĮŹ’╝ÜõĖŗĶĮĮ `.AppImage`ŃĆü`.deb` µł¢ `.rpm`

          ## macOS µÅÉńż║

          ÕĮōÕēŹ Release Õīģõ╝ÜÕ£©µŚĀ Apple Ķ»üõ╣”µŚČõĮ┐ńö© ad-hoc ńŁŠÕÉŹ’╝īõĮåõ╗Źµ£¬ÕüÜ Apple Õ«śµ¢╣Õģ¼Ķ»üŃĆéÕ”éµ×£ń│╗ń╗¤µŗ”µł¬’╝īĶ»ĘÕ£©Ķ«┐ĶŠŠõĖŁÕÅ│ķö«Õ║öńö©Õ╣ČķĆēµŗ®ŌĆ£µēōÕ╝ĆŌĆØŃĆé
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: artifacts/*
