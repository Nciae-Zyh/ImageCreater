name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron
        if: matrix.platform != 'mac'
        run: pnpm build

      - name: Build (${{ matrix.platform }})
        if: matrix.platform != 'mac'
        run: pnpm build:${{ matrix.platform }}

      - name: Build (mac x64)
        if: matrix.platform == 'mac'
        run: pnpm build:mac:x64

      - name: Build (mac arm64)
        if: matrix.platform == 'mac'
        run: pnpm build:mac:arm64

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.yaml

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.yml
            dist/*.yaml

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.yaml

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ## 下载说明

          - macOS Apple Silicon（M1/M2/M3/M4）：下载文件名包含 `mac-arm64` 的 `.dmg`
          - macOS Intel：下载文件名包含 `mac-x64` 的 `.dmg`
          - Windows 64 位：下载 `.exe`
          - Linux 64 位：下载 `.AppImage`、`.deb` 或 `.rpm`

          ## macOS 提示

          当前 Release 包未做 Apple 官方公证。如果系统提示无法打开，请在访达中右键应用并选择“打开”。
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: artifacts/*
